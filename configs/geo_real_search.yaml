# GeoResearch Agent config with real web search enabled.
# Keep configs/geo_mvp.yaml as the stable mock demo; use this file when you
# want evidence from live search APIs.

system:
  name: "GeoResearchAgent-RealSearch"
  version: "0.1.0"
  log_level: "INFO"
  work_dir: "./outputs"

output:
  language: "zh-CN"

model:
  active_preset: "balanced"
  default_profile: "solver"
  providers:
    deepseek:
      adapter: "openai_compatible"
      env_prefix: "DEEPSEEK"
      default_model: "deepseek-chat"
      default_base_url: "https://api.deepseek.com/v1"
  profiles:
    planner:
      provider: "deepseek"
      temperature: 0.2
      top_p: 1.0
      max_tokens: 4096
    solver:
      provider: "deepseek"
      temperature: 0.5
      top_p: 1.0
      max_tokens: 2048
    summarizer:
      provider: "deepseek"
      temperature: 0.4
      top_p: 1.0
      max_tokens: 4096
    compressor:
      provider: "deepseek"
      temperature: 0.1
      top_p: 1.0
      max_tokens: 1024
    wiki_ingest:
      provider: "deepseek"
      temperature: 0.1
      top_p: 1.0
      max_tokens: 6144
      response_format:
        type: "json_object"
  module_profiles:
    planner: "planner"
    solver: "solver"
    summarizer: "summarizer"
    compressor: "compressor"
    wiki_ingest: "wiki_ingest"
  presets:
    balanced:
      default_profile: "solver"
      module_profiles:
        planner: "planner"
        solver: "solver"
        summarizer: "summarizer"
        compressor: "compressor"
        wiki_ingest: "wiki_ingest"
    low_cost:
      default_profile: "solver"
      module_profiles:
        planner: "planner"
        solver: "solver"
        summarizer: "compressor"
        compressor: "compressor"
        wiki_ingest: "compressor"
    high_quality:
      default_profile: "solver"
      module_profiles:
        planner: "planner"
        solver: "solver"
        summarizer: "summarizer"
        compressor: "compressor"
        wiki_ingest: "wiki_ingest"

orchestrator:
  max_concurrent: 2
  global_timeout_seconds: 600
  max_replan_rounds: 1
  max_sub_questions: 6
  max_subagent_retries: 1

planner:
  domain: "geo_remote_sensing"
  max_search_rounds_per_subagent: 3
  enable_replan: true
  enable_completeness_check: false

agents:
  researcher:
    external_prefetch:
      enabled: true
      web_search_top_n: 3
      paper_search_top_n: 3
      timeout_seconds: 15
      max_chars_per_item: 500
    tool_loop:
      max_turns: 10
      max_tool_calls_before_summary: 2
      context_budget_tokens: 12000
      compact_threshold_ratio: 0.70
      compact_tool_result_chars: 4000
      tool_result_budget_chars: 4000
      synthesis_context_budget_tokens: 24000
      head_tail_ratio: 0.70
      chars_per_token: 3.5
  summarizer:
    compact:
      context_budget_tokens: 24000
      compact_threshold_ratio: 0.70
      compact_result_chars: 1800
      compact_evidence_items_per_result: 6
      chars_per_token: 3.5

compressor:
  max_context_length: 12000
  output_reserve_tokens: 1024
  l1_threshold: 0.6
  l2_threshold: 0.8
  l3_threshold: 0.95
  embedding_model: "all-MiniLM-L6-v2"
  enable_multilevel: true

memory:
  db_path: "data/geo_real_search_memory.db"
  include_global: true
  max_entries: 1000
  similarity_threshold_dup: 0.92
  similarity_threshold_conflict: 0.65
  evict_interval: 100
  enable_vector_index: true

wiki:
  enabled: true
  root_dir: "data/wiki"
  max_context_chars: 2000
  ingest:
    min_confidence: 0.5
    raw_dedup:
      enabled: true
      threshold: 0.72
      reingest_duplicate: false
    structured:
      enabled: true
      mode: "background"
      extractor: "llm"
      max_entities: 8
      max_source_chars: 18000
      join_on_exit: true
      join_timeout_seconds: 90

adversarial:
  enabled: false
  max_rounds: 1
  score_threshold: 9.5
  delta_threshold: 0.2
  save_logs: false

evolution:
  enabled: false

domain_adapter:
  mode: "geo_remote_sensing"
  user_adapters_dir: "data/user_adapters"

tools:
  web_search:
    enabled: true
    mock_mode: false
    max_results: 5
    snippet_max_tokens: 256
  official_source_search:
    max_domain_queries: 4
    max_query_variants: 2
    max_attempts: 6
  official_doc_fetcher:
    enabled: true
    timeout_seconds: 20
  paper_search:
    enabled: true
    backend: "openalex"
  arxiv_reader:
    enabled: false
    max_papers: 3
    abstract_max_tokens: 512
  code_sandbox:
    enabled: true
    timeout_seconds: 10
    max_memory_mb: 512
  file_reader:
    enabled: false
  notepad:
    enabled: false
